[general]
mock_mode = True
measurement_interval_s = 60
station_id = 1

[sampling]
default_samples = 5
collection_interval_s = 120
publish_interval_s = 600
sample_interval_ms = 200
outlier_method = mad
mad_threshold = 3.0
trim_ratio = 0.2
min_success_ratio = 0.6
failed_sample_policy = mark_only
scale_hx711_failed_sample_policy = carry_forward
max_cv_for_confidence = 0.35
sht35_samples = 5
tcs3448_samples = 5
scale_hx711_samples = 5
sensor_retry_interval_s = 60
sensor_failure_restart_min = 30
critical_sensors = sht35,tcs3448

[calibration]
enabled = True
interval_hours = 168
scale_hx711_drift_pct_warn = 5.0

[time_sync]
enabled = True
interval_hours = 24
timeout_s = 2.0
servers = pool.ntp.org,time.google.com,time.cloudflare.com

[debug_ui]
enabled = False
host = 127.0.0.1
port = 8080
write_token =
ta_password = admin12345
allow_remote_writes = False

[wifi]
ssid =
password =
country = BE
hidden = False
priority = 1

[sensors]
sht35 = mock
tcs3448 = mock
scale_hx711 = mock

[sht35]
i2c_address = 0x45
temp_offset = 0.0
hum_offset = 0.0


[tcs3448]
i2c_address = 0x59
integration_time = 50
gain = 4
dark_offset = 0
scale_f1 = 1.0
scale_f2 = 1.0
scale_f3 = 1.0
scale_f4 = 1.0
scale_f5 = 1.0
scale_f6 = 1.0
scale_f7 = 1.0
scale_f8 = 1.0
scale_fz = 1.0
scale_fy = 1.0
scale_fxl = 1.0
scale_nir = 1.0
scale_2x_vis_1 = 1.0
scale_fd_1 = 1.0

[scale_hx711]
dout_pin = 5
pd_sck_pin = 6
samples = 10
tare = 0.0
calibration_factor = 1.0
weight_offset = 0.0

[camera]
enabled = true
image_output_dir = data/images
warmup_seconds = 7
timeout_seconds = 16
interval_publishes = 144

[vision]
pixel_to_cm_ratio = 1.0
channel = k
kernel_size = 20
sigma = 2.0
skeleton_output = data/images/skeleton.jpg
background_image = data/images/background.jpg

[paths]
log_dir = logs
csv_path = data/measurements.csv
offline_queue_path = data/offline_queue.jsonl

[led_strip]
enabled = False
gpio_pin = 23
mock = False

[influxdb]
enabled = False
url = http://localhost:8086
token =
org =
bucket =
timeout_ms = 5000
