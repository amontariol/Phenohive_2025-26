server {
    listen 8081;
    server_name _;

    # Docker embedded DNS resolver for service-name upstream resolution.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Health endpoint for local checks
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Allow Influx write API
    location /api/v2/write {
        set $influx_upstream http://influxdb:8086;
        proxy_http_version 1.1;
        proxy_set_header Host influxdb;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Keep query string (org, bucket, precision) intact.
        proxy_pass $influx_upstream$request_uri;
    }

    # Allow Influx query API for station ID validation
    location /api/v2/query {
        set $influx_upstream http://influxdb:8086;
        proxy_http_version 1.1;
        proxy_set_header Host influxdb;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Keep query string (org, bucket, precision) intact.
        proxy_pass $influx_upstream$request_uri;
    }

    location / {
        return 403;
    }
}
