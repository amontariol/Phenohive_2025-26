services:
  influxdb:
    image: influxdb:2.7
    container_name: phenohive_influxdb
    hostname: influxdb
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD:?Set INFLUXDB_INIT_PASSWORD in .env}
      DOCKER_INFLUXDB_INIT_ORG: uclouvain
      DOCKER_INFLUXDB_INIT_BUCKET: phenohive
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN:?Set INFLUXDB_INIT_ADMIN_TOKEN in .env}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: [ "CMD", "influx", "ping" ]
      interval: 10s
      timeout: 5s
    restart: always
    networks:
      - default

  influx_write_proxy:
    image: nginx:alpine
    container_name: phenohive_influx_write_proxy
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "0.0.0.0:8081:8081"
    volumes:
      - ./infrastructure/nginx/influx-write-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: phenohive_grafana
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    restart: always
    networks:
      - default

  grafana_access_sync:
    image: python:3.11-slim
    container_name: phenohive_grafana_sync
    depends_on:
      grafana:
        condition: service_started
    volumes:
      - ./scripts:/app/scripts:ro
      - ./grafana/access-control:/app/grafana/access-control:rw
      - ./grafana/dashboards:/app/grafana/dashboards:rw
    environment:
      PYTHONUNBUFFERED: "1"
      GRAFANA_URL: http://grafana:3000
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN:?Set INFLUXDB_INIT_ADMIN_TOKEN in .env}
      INFLUX_ORG: uclouvain
      INFLUX_BUCKET: phenohive
      AUTO_SYNC_INTERVAL_S: "60"
    entrypoint: /bin/bash
    command: [ "/app/scripts/entrypoint-auto-sync.sh" ]
    restart: always
    networks:
      - default

  phenohive_station:
    profiles: [ "local" ]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phenohive_station
    depends_on:
      influxdb:
        condition: service_healthy
      influx_write_proxy:
        condition: service_started
    volumes:
      - .:/app
      - ./config-station-02.ini:/app/config.ini
    environment:
      PYTHONUNBUFFERED: "1"
      INFLUX_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN:?Set INFLUXDB_INIT_ADMIN_TOKEN in .env}
    ports:
      - "127.0.0.1:8080:8080"
    restart: always
    networks:
      - default

networks:
  default:
    external: false
    name: phenohive-network

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
